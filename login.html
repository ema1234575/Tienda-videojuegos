<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="página de venta de videojuegos y consolas">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/x-icon" href="img/gamepad-solid.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Iniciar sesión - Tienda Gamer</title>
</head>

<body>
    <header class="header-container">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" title="Tienda Gamer">
                    <img src="img/logo_tienda_gamer.png" alt="logo tienda gamer">
                </a>
            </div>

            <ul>
                <li><a href="index.html" title="Inicio">Inicio</a></li>
                <li><a href="#" title="consolas">Consolas</a></li>
                <li><a href="#" title="videojuegos">Videojuegos</a></li>
            </ul>
            <div class="icons">
                <span class="material-symbols-outlined" title="Iniciar sesión">
                    account_circle
                </span>
                <span class="material-symbols-outlined" title="Carrito">shopping_cart</span>
            </div>
        </nav>
        <hr>
    </header>

    <main>

        <div id="form-container">
            <form action="#">
                <h2>Iniciar Sesión</h2>
                <label for="email">Email</label>
                <input type="text" id="email" name="email">
                <label for="key">Contraseña</label>
                <input type="text" id="passw" name="password">
                <input class="boton_comprar" type="submit" value="Ingresar">
                <p style="color:blue; cursor:pointer">¿Olvidaste tu contraseña?</p>
            </form>
        </div>

    </main>

</body>

</html>
